// Inicializar mapa
const map = L.map('map', {
  center: [-33.0, -68.93],
  zoom: 12,
  zoomControl: false
});

L.control.zoom({ position: 'topright' }).addTo(map);

// Capa satélite
const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Esri World Imagery', maxZoom: 19 }
).addTo(map);

// Etiquetas sobre satélite
const labels = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  { attribution: '', maxZoom: 19, opacity: 0.8 }
).addTo(map);

// Colores semáforo
function getColor(tipo) {
  switch(tipo) {
    case 'FORMAL': return '#22c55e';
    case 'INFORMAL EN REGULARIZACION': return '#f59e0b';
    case 'INFORMAL': return '#ef4444';
    case 'POPULAR': return '#f59e0b';
    default: return '#888';
  }
}

function getLabel(tipo) {
  switch(tipo) {
    case 'FORMAL': return 'Formal';
    case 'INFORMAL EN REGULARIZACION': return 'Informal en Regularización';
    case 'INFORMAL': return 'Informal';
    case 'POPULAR': return 'Informal en Regularización';
    default: return tipo;
  }
}

function getBadgeStyle(tipo) {
  switch(tipo) {
    case 'FORMAL': return 'background:#166534;color:#bbf7d0;';
    case 'INFORMAL EN REGULARIZACION': return 'background:#78350f;color:#fde68a;';
    case 'INFORMAL': return 'background:#7f1d1d;color:#fecaca;';
    case 'POPULAR': return 'background:#78350f;color:#fde68a;';
    default: return 'background:#333;color:#eee;';
  }
}

// Capa loteos
const loteosLayer = L.geoJSON(LOTEOS_DATA, {
  style: function(feature) {
    const tipo = feature.properties.tipo;
    const color = getColor(tipo);
    return {
      fillColor: color,
      fillOpacity: 0.55,
      color: color,
      weight: 1.5,
      opacity: 0.9
    };
  },
  onEachFeature: function(feature, layer) {
    const p = feature.properties;
    const color = getColor(p.tipo);
    layer.on('click', function() {
      layer.bindPopup(`
        <div class="popup-title">${p.nom_barrio || 'Sin nombre'}</div>
        <div><span class="popup-badge" style="${getBadgeStyle(p.tipo)}">${getLabel(p.tipo)}</span></div>
        <div class="popup-row">Características: <span>${p.caracteris || '-'}</span></div>
        <div class="popup-row">Distrito: <span>${p.distritos || '-'}</span></div>
      `).openPopup();
    });
    layer.on('mouseover', function() {
      layer.setStyle({ fillOpacity: 0.85, weight: 2.5 });
    });
    layer.on('mouseout', function() {
      layer.setStyle({ fillOpacity: 0.55, weight: 1.5 });
    });
  }
}).addTo(map);

// Ícono personalizado para pozos
function pozoIcon() {
  return L.divIcon({
    html: `<div style="
      width:14px; height:14px;
      background:#38bdf8;
      border:2.5px solid #fff;
      border-radius:50%;
      box-shadow:0 0 8px #38bdf8, 0 0 0 3px rgba(56,189,248,0.3);
    "></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

// Capa pozos
const pozosLayer = L.geoJSON(POZOS_DATA, {
  pointToLayer: function(feature, latlng) {
    return L.marker(latlng, { icon: pozoIcon() });
  },
  onEachFeature: function(feature, layer) {
    const p = feature.properties;
    let linksHtml = '';
    if (p.perfil) linksHtml += `<a href="${p.perfil}" target="_blank" style="color:#38bdf8;font-size:11px;display:block;margin-top:4px;">📄 Ver perfil</a>`;
    if (p.telemetria) linksHtml += `<a href="${p.telemetria}" target="_blank" style="color:#38bdf8;font-size:11px;display:block;">📡 Telemetría</a>`;
    layer.bindPopup(`
      <div class="popup-title">💧 ${p.nombre || 'Pozo sin nombre'}</div>
      ${linksHtml || '<div class="popup-row">Sin información adicional</div>'}
    `);
  }
}).addTo(map);

// Capa área servida
const areaLayer = L.geoJSON(AREA_DATA, {
  style: {
    color: '#a78bfa',
    weight: 2.5,
    opacity: 0.9,
    dashArray: '6 4'
  }
}).addTo(map);

// Ajustar vista a los loteos
map.fitBounds(loteosLayer.getBounds(), { padding: [30, 30] });

// ===== LEYENDA =====
const legendControl = L.control({ position: 'bottomleft' });
legendControl.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>Referencias</h4>
    <div class="legend-section">
      <div class="legend-section-title">Clasificación de Loteos</div>
      <div class="legend-item" id="leg-formal" onclick="toggleLayer('formal')">
        <div class="swatch" style="background:#22c55e;"></div>
        Formal
      </div>
      <div class="legend-item" id="leg-regularizacion" onclick="toggleLayer('regularizacion')">
        <div class="swatch" style="background:#f59e0b;"></div>
        Informal en Regularización
      </div>
      <div class="legend-item" id="leg-informal" onclick="toggleLayer('informal')">
        <div class="swatch" style="background:#ef4444;"></div>
        Informal
      </div>
    </div>
    <div class="legend-section">
      <div class="legend-section-title">Infraestructura Aguas Luján</div>
      <div class="legend-item" id="leg-pozos" onclick="toggleLayer('pozos')">
        <div class="swatch-circle" style="background:#38bdf8;border-color:#fff;"></div>
        Pozos
      </div>
      <div class="legend-item" id="leg-area" onclick="toggleLayer('area')">
        <div class="swatch-line" style="background:#a78bfa;"></div>
        Área Servida
      </div>
    </div>
    <div style="font-size:10px;color:#677;margin-top:4px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;">
      Clic en leyenda para mostrar/ocultar capas
    </div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
legendControl.addTo(map);

// ===== STATS =====
const counts = { formal:0, regularizacion:0, informal:0 };
LOTEOS_DATA.features.forEach(f => {
  const t = f.properties.tipo;
  if (t === 'FORMAL') counts.formal++;
  else if (t === 'INFORMAL EN REGULARIZACION' || t === 'POPULAR') counts.regularizacion++;
  else if (t === 'INFORMAL') counts.informal++;
});

const statsControl = L.control({ position: 'topright' });
statsControl.onAdd = function() {
  const div = L.DomUtil.create('div', 'stats-box');
  div.style.marginTop = '40px';
  div.innerHTML = `
    <h4>Resumen · Vertientes del Pedemonte</h4>
    <div class="stat-row">
      <div class="stat-label"><span class="stat-dot" style="background:#22c55e"></span>Formal</div>
      <div class="stat-val">${counts.formal} loteos</div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span class="stat-dot" style="background:#f59e0b"></span>En Regularización</div>
      <div class="stat-val">${counts.regularizacion} loteos</div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span class="stat-dot" style="background:#ef4444"></span>Informal</div>
      <div class="stat-val">${counts.informal} loteos</div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.1);margin-top:6px;padding-top:6px;" class="stat-row">
      <div class="stat-label">💧 Pozos</div>
      <div class="stat-val">31</div>
    </div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
statsControl.addTo(map);

// Toggle de capas
const layerState = { formal:true, regularizacion:true, informal:true, pozos:true, area:true };

function toggleLayer(name) {
  layerState[name] = !layerState[name];
  document.getElementById('leg-' + name).classList.toggle('inactive', !layerState[name]);
  
  if (name === 'pozos') {
    layerState.pozos ? map.addLayer(pozosLayer) : map.removeLayer(pozosLayer);
    return;
  }
  if (name === 'area') {
    layerState.area ? map.addLayer(areaLayer) : map.removeLayer(areaLayer);
    return;
  }
  
  // Redraw loteos filtrando
  loteosLayer.eachLayer(function(layer) {
    const tipo = layer.feature.properties.tipo;
    const isForma = tipo === 'FORMAL';
    const isReg = tipo === 'INFORMAL EN REGULARIZACION' || tipo === 'POPULAR';
    const isInf = tipo === 'INFORMAL';
    
    const visible = (isForma && layerState.formal) ||
                    (isReg && layerState.regularizacion) ||
                    (isInf && layerState.informal);
    
    layer.setStyle({ fillOpacity: visible ? 0.55 : 0, opacity: visible ? 0.9 : 0, interactive: visible });
  });
}
</script>
